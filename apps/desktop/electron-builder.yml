appId: com.linghun.desktop
productName: Linghun
copyright: Copyright © 2024 Linghun

directories:
  output: dist-electron

files:
  - dist/**/*
  - node_modules/**/*
  - package.json

# Rust 二进制不打进 asar，放到 resources/bundled
asarUnpack:
  - resources/bundled/**

extraResources:
  - from: ../../apps/cli/bundled
    to: bundled

# Phase 1 暂不带品牌图标，electron-builder 回退默认 Electron 图标。
# 有 assets/icon.{ico,icns,png} 后再各平台加回 icon 字段。
win:
  target:
    - target: nsis
      arch: [x64]

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true

mac:
  target: dmg
  category: public.app-category.developer-tools

linux:
  target: AppImage
  category: Development
