name: Build Desktop App

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/build-desktop.yml"
      - "apps/desktop/**"
      - "packages/tui/**"
      - "packages/core/**"
      - "packages/providers/**"

jobs:
  build-win:
    name: Windows NSIS installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: pnpm/action-setup@v4
        with:
          version: 10.10.0

      - name: Install dependencies
        run: corepack pnpm install --no-frozen-lockfile

      # 桌面端主进程运行时 import 引擎底座的 dist，需先按依赖链构建
      - name: Build engine packages
        run: |
          corepack pnpm --filter @linghun/shared build
          corepack pnpm --filter @linghun/config build
          corepack pnpm --filter @linghun/core build
          corepack pnpm --filter @linghun/tools build
          corepack pnpm --filter @linghun/ink-runtime build
          corepack pnpm --filter @linghun/providers build
          corepack pnpm --filter @linghun/tui build

      - name: Typecheck desktop
        run: corepack pnpm --filter @linghun/desktop typecheck

      - name: Build desktop renderer + main
        run: corepack pnpm --filter @linghun/desktop build

      # electron-builder 的 extraResources 指向 apps/cli/bundled，
      # 该目录由 bundled-runtime workflow 产出；CI 单独构建时给空目录兜底，避免打包失败。
      - name: Ensure bundled runtime dir
        shell: bash
        run: mkdir -p apps/cli/bundled

      - name: Package NSIS installer
        run: corepack pnpm --filter @linghun/desktop dist:win
        env:
          # 不做代码签名（Phase 1）
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - uses: actions/upload-artifact@v4
        with:
          name: linghun-desktop-win
          path: apps/desktop/dist-electron/*.exe
          if-no-files-found: error
